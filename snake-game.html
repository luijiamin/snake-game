<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        
        h1 {
            color: #e94560;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
            font-size: 2.5rem;
        }
        
        .game-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .score-board {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            color: #fff;
            font-size: 1.2rem;
        }
        
        .score-board span {
            background: rgba(233, 69, 96, 0.3);
            padding: 8px 20px;
            border-radius: 20px;
        }
        
        canvas {
            background: #0a0a0a;
            border-radius: 10px;
            display: block;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5);
        }
        
        .controls {
            margin-top: 15px;
            color: #aaa;
            text-align: center;
            font-size: 0.9rem;
        }
        
        .controls kbd {
            background: #333;
            padding: 3px 8px;
            border-radius: 4px;
            margin: 0 2px;
        }
        
        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .game-over.show {
            display: flex;
        }
        
        .game-over h2 {
            color: #e94560;
            font-size: 3rem;
            margin-bottom: 20px;
        }
        
        .game-over p {
            color: #fff;
            font-size: 1.5rem;
            margin-bottom: 30px;
        }
        
        .btn {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }
        
        .btn:hover {
            background: #ff6b6b;
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }
        
        .start-btn {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇</h1>
    
    <div class="game-container">
        <div class="score-board">
            <span>分数: <b id="score">0</b></span>
            <span>最高分: <b id="highScore">0</b></span>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            使用 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 控制方向
        </div>
    </div>
    
    <button class="btn start-btn" onclick="startGame()">🎮 开始游戏</button>
    
    <div class="game-over" id="gameOver">
        <h2>游戏结束!</h2>
        <p>最终得分: <span id="finalScore">0</span></p>
        <button class="btn" onclick="startGame()">🔄 再来一局</button>
        <button class="btn" onclick="closeGameOver()">关 闭</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [];
        let food = { x: 0, y: 0 };
        let direction = { x: 0, y: 0 };
        let nextDirection = { x: 0, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameInterval = null;
        let gameRunning = false;
        
        highScoreEl.textContent = highScore;
        
        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            scoreEl.textContent = score;
            spawnFood();
        }
        
        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    spawnFood();
                    break;
                }
            }
        }
        
        function draw() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            
            const foodGradient = ctx.createRadialGradient(
                food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, 0,
                food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2
            );
            foodGradient.addColorStop(0, '#ff6b6b');
            foodGradient.addColorStop(1, '#e94560');
            ctx.fillStyle = foodGradient;
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            
            snake.forEach((segment, index) => {
                const isHead = index === 0;
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize/2, segment.y * gridSize + gridSize/2, 0,
                    segment.x * gridSize + gridSize/2, segment.y * gridSize + gridSize/2, gridSize/2
                );
                
                if (isHead) {
                    gradient.addColorStop(0, '#4ade80');
                    gradient.addColorStop(1, '#22c55e');
                } else {
                    const alpha = 1 - (index / snake.length) * 0.5;
                    gradient.addColorStop(0, `rgba(74, 222, 128, ${alpha})`);
                    gradient.addColorStop(1, `rgba(34, 197, 94, ${alpha})`);
                }
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2, 4);
                ctx.fill();
                
                if (isHead) {
                    ctx.fillStyle = '#fff';
                    const eyeSize = 3;
                    const eyeOffset = 5;
                    
                    let eye1X, eye1Y, eye2X, eye2Y;
                    
                    if (direction.x === 1) {
                        eye1X = segment.x * gridSize + gridSize - eyeOffset;
                        eye1Y = segment.y * gridSize + eyeOffset;
                        eye2X = segment.x * gridSize + gridSize - eyeOffset;
                        eye2Y = segment.y * gridSize + gridSize - eyeOffset;
                    } else if (direction.x === -1) {
                        eye1X = segment.x * gridSize + eyeOffset;
                        eye1Y = segment.y * gridSize + eyeOffset;
                        eye2X = segment.x * gridSize + eyeOffset;
                        eye2Y = segment.y * gridSize + gridSize - eyeOffset;
                    } else if (direction.y === -1) {
                        eye1X = segment.x * gridSize + eyeOffset;
                        eye1Y = segment.y * gridSize + eyeOffset;
                        eye2X = segment.x * gridSize + gridSize - eyeOffset;
                        eye2Y = segment.y * gridSize + eyeOffset;
                    } else {
                        eye1X = segment.x * gridSize + eyeOffset;
                        eye1Y = segment.y * gridSize + gridSize - eyeOffset;
                        eye2X = segment.x * gridSize + gridSize - eyeOffset;
                        eye2Y = segment.y * gridSize + gridSize - eyeOffset;
                    }
                    
                    ctx.beginPath();
                    ctx.arc(eye1X, eye1Y, eyeSize, 0, Math.PI * 2);
                    ctx.arc(eye2X, eye2Y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }
        
        function update() {
            direction = { ...nextDirection };
            
            const head = { 
                x: snake[0].x + direction.x, 
                y: snake[0].y + direction.y 
            };
            
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }
            
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    endGame();
                    return;
                }
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                spawnFood();
            } else {
                snake.pop();
            }
            
            draw();
        }
        
        function startGame() {
            if (gameRunning) {
                clearInterval(gameInterval);
            }
            gameOverEl.classList.remove('show');
            initGame();
            gameRunning = true;
            draw();
            gameInterval = setInterval(update, 100);
        }
        
        function endGame() {
            clearInterval(gameInterval);
            gameRunning = false;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.textContent = highScore;
            }
            
            finalScoreEl.textContent = score;
            gameOverEl.classList.add('show');
        }
        
        function closeGameOver() {
            gameOverEl.classList.remove('show');
        }
        
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y !== 1) {
                        nextDirection = { x: 0, y: -1 };
                    }
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y !== -1) {
                        nextDirection = { x: 0, y: 1 };
                    }
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x !== 1) {
                        nextDirection = { x: -1, y: 0 };
                    }
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x !== -1) {
                        nextDirection = { x: 1, y: 0 };
                    }
                    e.preventDefault();
                    break;
            }
        });
        
        initGame();
        draw();
    </script>
</body>
</html>
